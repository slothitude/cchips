# Single-port deployment - all services via nginx reverse proxy
# Port 80 serves: UI, API, Wrapper API, Search, ttyd Web Terminal
#
# Usage:
#   docker-compose up -d
#   docker-compose -p claude1 up -d  # Named instance
#
# Claude Code OpenAI Wrapper provides:
#   POST /v1/chat/completions  - OpenAI-compatible chat
#   POST /v1/messages          - Anthropic-compatible messages
#   GET  /v1/models            - List available models
#   GET  /wrapper/             - Wrapper landing page
#
# ttyd provides:
#   GET  /ttyd/                - Web terminal with auto-login

services:
  claude-sshwifty:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ${COMPOSE_PROJECT_NAME:-claude}-agent
    ports:
      - "${PORT:-80}:80"      # Single port - everything proxied through nginx
      - "${SSH_PORT:-22}:22"  # SSH/SFTP (optional, can be disabled)
    volumes:
      - ./data:/home/claude
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      - PORT=${PORT:-80}
      - AGENT_API_TOKEN=${AGENT_API_TOKEN:-}
      # Claude Code OpenAI Wrapper configuration
      - CLAUDE_AUTH_METHOD=${CLAUDE_AUTH_METHOD:-api_key}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
      - ANTHROPIC_BASE_URL=${ANTHROPIC_BASE_URL:-}
      - MAX_TIMEOUT=${MAX_TIMEOUT:-600000}
      # AWS Bedrock (if using bedrock auth)
      - AWS_ACCESS_KEY_ID=${AWS_ACCESS_KEY_ID:-}
      - AWS_SECRET_ACCESS_KEY=${AWS_SECRET_ACCESS_KEY:-}
      - AWS_REGION=${AWS_REGION:-us-east-1}
      # Google Vertex AI (if using vertex auth)
      - GOOGLE_APPLICATION_CREDENTIALS=${GOOGLE_APPLICATION_CREDENTIALS:-}
      - GCP_PROJECT=${GCP_PROJECT:-}
      - GCP_REGION=${GCP_REGION:-us-central1}
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  searxng:
    image: searxng/searxng:latest
    container_name: ${COMPOSE_PROJECT_NAME:-claude}-searxng
    ports:
      - "8888:8080"
    volumes:
      - ./searxng:/etc/searxng:rw
    environment:
      - SEARXNG_BASE_URL=http://localhost:${PORT:-80}/search/
      - SEARXNG_SECRET=${SEARXNG_SECRET:-secretkey123}
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:8080/"]
      interval: 30s
      timeout: 10s
      retries: 3
