[global]
   workgroup = WORKGROUP
   server string = Claude Ubuntu Samba
   security = user
   map to guest = Bad User
   dns proxy = no
   log file = /var/log/samba/log.%m
   max log size = 50

[claude]
   comment = Claude Home Directory
   path = /home/claude
   browseable = yes
   read only = no
   create mask = 0755
   directory mask = 0755
   valid users = claude
   force user = claude
   force group = claude

[projects]
   comment = Claude Projects
   path = /home/claude/projects
   browseable = yes
   read only = no
   create mask = 0755
   directory mask = 0755
   valid users = claude
   force user = claude
   force group = claude

[webapps]
   comment = Web Applications (Flask/Nginx)
   path = /home/claude/webapps
   browseable = yes
   read only = no
   create mask = 0755
   directory mask = 0755
   valid users = claude
   force user = claude
   force group = claude
